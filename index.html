<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen - Advanced Video Editor</title>
    <style>
        /* NextGen Pro Dark Theme */
        body { margin: 0; padding: 0; background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        header { background-color: #1e1e1e; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; height: 60px; box-sizing: border-box; }
        .logo { font-size: 24px; font-weight: bold; color: #00a8ff; letter-spacing: 1px; }
        .export-btn { background-color: #00a8ff; color: white; border: none; padding: 8px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .export-btn:hover { background-color: #008be6; }

        /* Workspace Grid */
        .workspace { display: flex; flex: 1; height: calc(100vh - 300px); }
        
        /* Left Panel */
        .left-panel { width: 80px; background-color: #181818; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 15px; }
        .tool-icon { color: #888; font-size: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; gap: 5px; }
        .tool-icon:hover, .tool-icon.active { color: #00a8ff; }

        /* Media Panel */
        .media-panel { width: 250px; background-color: #1e1e1e; border-right: 1px solid #333; padding: 15px; }
        .upload-box { border: 2px dashed #444; border-radius: 8px; padding: 30px 10px; text-align: center; cursor: pointer; background: #252525; transition: 0.3s; }
        .upload-box:hover { border-color: #00a8ff; background: #2a2a2a; }
        .upload-box label { cursor: pointer; color: #00a8ff; font-weight: bold; }

        /* Center Preview */
        .center-preview { flex: 1; background-color: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; }
        video { width: 80%; max-height: 75%; background-color: black; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); display: none; }
        
        /* New Time & Controls Display */
        .player-bar { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; display: none; width: 80%; }
        .time-display { font-family: monospace; font-size: 16px; color: #00a8ff; background: #1e1e1e; padding: 5px 15px; border-radius: 20px; border: 1px solid #333; }
        .player-controls button { background: #252525; border: 1px solid #444; color: white; cursor: pointer; padding: 8px 20px; border-radius: 6px; font-weight: bold; margin: 0 5px; }
        .player-controls button:hover { background: #333; border-color: #00a8ff; }

        /* Right Panel */
        .right-panel { width: 320px; background-color: #181818; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .properties-content { padding: 20px; overflow-y: auto; flex: 1; }
        .prop-group { margin-bottom: 25px; border-bottom: 1px solid #2a2a2a; padding-bottom: 15px; }
        .prop-group label { display: flex; justify-content: space-between; font-size: 13px; color: #bbb; margin-bottom: 10px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00a8ff; }

        /* Bottom Timeline (The Real Magic) */
        .timeline { height: 300px; background-color: #1a1a1a; border-top: 1px solid #333; display: flex; flex-direction: column; }
        .timeline-tools { padding: 10px 20px; background: #1e1e1e; display: flex; gap: 15px; border-bottom: 1px solid #333; align-items: center; }
        .timeline-tools button { background: transparent; border: 1px solid #555; color: white; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .timeline-tools button:hover { background: #333; color: #00a8ff; border-color: #00a8ff; }
        
        .timeline-tracks { flex: 1; padding: 20px 10px; overflow-x: auto; background: #151515; position: relative; cursor: text; }
        
        /* Playhead (Red Line) */
        .playhead { position: absolute; top: 0; bottom: 0; left: 0%; width: 2px; background-color: #ff3b30; z-index: 10; pointer-events: none; }
        .playhead::before { content: ''; position: absolute; top: 0; left: -5px; width: 12px; height: 15px; background: #ff3b30; border-radius: 2px; }

        /* Video Tracks & Clips */
        .track-container { position: relative; height: 60px; margin-bottom: 10px; background: #222; border-radius: 5px; width: 100%; }
        .video-clip { position: absolute; top: 0; left: 0; height: 100%; width: 100%; background: linear-gradient(90deg, #005a9e, #0078d4); border-radius: 4px; border: 2px solid transparent; display: flex; align-items: center; padding-left: 10px; font-size: 12px; font-weight: bold; overflow: hidden; display: none; cursor: pointer; transition: border 0.2s; box-sizing: border-box; }
        .video-clip:hover { border: 2px solid rgba(255,255,255,0.5); }
        .video-clip.selected { border: 2px solid white; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .clip-thumbnail { height: 100%; width: auto; opacity: 0.5; position: absolute; right: 0; mix-blend-mode: overlay; }
    </style>
</head>
<body>

    <header>
        <div class="logo">🚀 NextGen</div>
        <button class="export-btn">Export HD</button>
    </header>

    <div class="workspace">
        <div class="left-panel">
            <div class="tool-icon active">📁<br>Media</div>
            <div class="tool-icon">✨<br>Effects</div>
        </div>

        <div class="media-panel">
            <h3 style="margin-top:0;">Project Files</h3>
            <div class="upload-box">
                <p style="font-size: 30px; margin: 0;">+</p>
                <p><label for="uploadVideo">Click to Add Video</label></p>
                <input type="file" id="uploadVideo" accept="video/*" style="display: none;">
            </div>
        </div>

        <div class="center-preview">
            <p id="noVideoText" style="color: #666;">Waiting for media...</p>
            <video id="videoPlayer"></video>
            
            <!-- Real Controls & Timecode -->
            <div class="player-bar" id="playerBar">
                <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
                <div class="player-controls">
                    <button onclick="togglePlay()" id="playBtn">▶ Play</button>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="properties-content">
                <h3 style="margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;">Adjustments</h3>
                <div class="prop-group">
                    <label><span>Speed</span> <span id="speedVal">1x</span></label>
                    <input type="range" min="0.1" max="4" step="0.1" value="1" oninput="document.getElementById('speedVal').innerText = this.value + 'x'; document.getElementById('videoPlayer').playbackRate = this.value;">
                </div>
                <div class="prop-group">
                    <label><span>Scale</span> <span id="scaleVal">100%</span></label>
                    <input type="range" min="10" max="200" value="100" oninput="document.getElementById('scaleVal').innerText = this.value + '%'; document.getElementById('videoPlayer').style.transform = `scale(${this.value/100})`;">
                </div>
                <div class="prop-group">
                    <label><span>Volume</span> <span id="volVal">100%</span></label>
                    <input type="range" min="0" max="100" value="100" oninput="document.getElementById('volVal').innerText = this.value + '%'; document.getElementById('videoPlayer').volume = this.value/100;">
                </div>
                <p style="color:#777; font-size:12px;">Select the clip on the timeline to enable more tools.</p>
            </div>
        </div>
    </div>

    <!-- Interactive Timeline -->
    <div class="timeline">
        <div class="timeline-tools">
            <button onclick="splitClip()">✂ Split (Cut)</button>
            <button onclick="deleteClip()">🗑 Delete</button>
            <span style="color: #666; font-size: 12px; margin-left: auto;">Use timeline to scrub video</span>
        </div>
        <div class="timeline-tracks" id="trackArea">
            <!-- The Red Moving Line -->
            <div class="playhead" id="playhead"></div>
            
            <div class="track-container" id="mainTrack">
                <div class="video-clip selected" id="timelineClip" onclick="selectClip(this)">
                    <span id="clipName">🎬 Clip 1</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploader = document.getElementById('uploadVideo');
        const player = document.getElementById('videoPlayer');
        const playerBar = document.getElementById('playerBar');
        const timelineClip = document.getElementById('timelineClip');
        const playhead = document.getElementById('playhead');
        const timeDisplay = document.getElementById('timeDisplay');
        const trackArea = document.getElementById('trackArea');
        const playBtn = document.getElementById('playBtn');

        // File Upload Logic
        uploader.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                player.src = URL.createObjectURL(file);
                player.style.display = 'block';
                document.getElementById('noVideoText').style.display = 'none';
                playerBar.style.display = 'flex';
                
                timelineClip.style.display = 'flex';
                document.getElementById('clipName').innerText = '🎬 ' + file.name;
            }
        });

        // Toggle Play/Pause
        function togglePlay() {
            if (player.paused) {
                player.play();
                playBtn.innerText = "⏸ Pause";
            } else {
                player.pause();
                playBtn.innerText = "▶ Play";
            }
        }

        // Playhead & Timecode Sync Logic (Real Editor Feel)
        player.addEventListener('timeupdate', () => {
            if(!player.duration) return;
            
            // Move Red Line
            const progress = (player.currentTime / player.duration) * 100;
            playhead.style.left = progress + '%';

            // Update 00:00 Timer
            timeDisplay.innerText = formatTime(player.currentTime) + " / " + formatTime(player.duration);
            
            // Revert Play button when video ends
            if(player.ended) playBtn.innerText = "▶ Play";
        });

        // Format Seconds to MM:SS
        function formatTime(seconds) {
            if(isNaN(seconds)) return "00:00";
            const min = Math.floor(seconds / 60).toString().padStart(2, '0');
            const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${min}:${sec}`;
        }

        // Timeline Scrubbing (Click to Jump)
        trackArea.addEventListener('click', (e) => {
            if(!player.duration) return;
            // Agar clip par click kiya hai toh aage code skip mat karo, scrub karo
            const rect = trackArea.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percentage = clickX / rect.width;
            
            // Update video time
            player.currentTime = percentage * player.duration;
        });

        // Highlight Clip when clicked
        function selectClip(element) {
            element.classList.add('selected');
        }

        // Split (Cut) Logic! (Visual Magic)
        function splitClip() {
            if(!player.duration) {
                alert("Please upload a video first!");
                return;
            }
            
            const progress = (player.currentTime / player.duration) * 100;
            
            // Puraani clip ko chota karo
            timelineClip.style.width = progress + '%';
            timelineClip.style.borderRight = '2px solid #ff3b30'; // Lal nishan ke cut lag gaya
            timelineClip.classList.remove('selected');

            // Nayi clip create karo (Cut ke aage ka hissa)
            const newClip = document.createElement('div');
            newClip.className = 'video-clip selected'; // Nayi clip automatically select ho jayegi
            newClip.style.display = 'flex';
            newClip.style.left = progress + '%';
            newClip.style.width = (100 - progress) + '%';
            newClip.innerHTML = '<span>🎬 Cut Part</span>';
            newClip.onclick = function() { selectClip(this) };
            
            document.getElementById('mainTrack').appendChild(newClip);
        }

        // Fake Delete for feel
        function deleteClip() {
            alert("This feature will remove the selected block in the next advanced update!");
        }
    </script>
</body>
</html>
